<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9933;
            --bg-color: #fdfbf7;
            --text-color: #333;
            --card-bg: #fff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        button,
        input,
        select,
        textarea {
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #d35400;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Begin Your Comparison</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/auth/signup" method="post">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="tel" name="mobile_number" placeholder="Mobile Number" required>

            <!-- City Search -->
            <div style="position: relative;">
                <input type="text" id="city_search" placeholder="Search City (e.g. Mumbai)" autocomplete="off">
                <div id="search_results"
                    style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; max-height: 200px; overflow-y: auto; z-index: 1000; display: none;">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" name="latitude" placeholder="Lat" id="lat" required readonly
                    style="background-color: #f0f0f0; color: #666;">
                <input type="text" name="longitude" placeholder="Lon" id="lon" required readonly
                    style="background-color: #f0f0f0; color: #666;">
            </div>
            <button type="button" onclick="getLocation()"
                style="background-color: #eee; color: #333; margin-top: 5px; margin-bottom: 10px;">Or Use Current
                Location</button>

            <button type="submit">Sign Up</button>
        </form>

        <div style="margin: 15px 0; color: #aaa; display: flex; align-items: center;">
            <span style="flex:1; border-top: 1px solid #eee;"></span>
            <span style="padding: 0 10px; font-size: 0.85rem;">OR</span>
            <span style="flex:1; border-top: 1px solid #eee;"></span>
        </div>

        <a href="/auth/google/login" style="text-decoration: none;">
            <button type="button"
                style="background-color: white; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="G">
                Sign up with Google
            </button>
        </a>
        <br>
        <a href="/auth/login">Already have an account? Login</a>
    </div>

    <script>
        const searchInput = document.getElementById('city_search');
        const resultsBox = document.getElementById('search_results');
        let timeout = null;

        searchInput.addEventListener('input', function () {
            clearTimeout(timeout);
            const query = this.value;
            if (query.length < 3) {
                resultsBox.style.display = 'none';
                return;
            }

            timeout = setTimeout(async () => {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
                const data = await response.json();

                resultsBox.innerHTML = '';
                if (data.length > 0) {
                    resultsBox.style.display = 'block';
                    data.forEach(place => {
                        const div = document.createElement('div');
                        div.style.padding = '10px';
                        div.style.cursor = 'pointer';
                        div.style.borderBottom = '1px solid #eee';
                        div.innerText = place.display_name;
                        div.onmouseover = () => div.style.backgroundColor = '#f9f9f9';
                        div.onmouseout = () => div.style.backgroundColor = 'white';

                        div.onclick = () => {
                            document.getElementById('lat').value = place.lat;
                            document.getElementById('lon').value = place.lon;
                            searchInput.value = place.display_name.split(',')[0]; // Keep it short
                            resultsBox.style.display = 'none';
                        };
                        resultsBox.appendChild(div);
                    });
                } else {
                    resultsBox.style.display = 'none';
                }
            }, 500);
        });

        // Close results on click outside
        document.addEventListener('click', function (e) {
            if (e.target !== searchInput) {
                resultsBox.style.display = 'none';
            }
        });

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }
        function showPosition(position) {
            document.getElementById("lat").value = position.coords.latitude;
            document.getElementById("lon").value = position.coords.longitude;
            // Reverse Geocoding prompt could go here, but keeping it simple for now
            document.getElementById("city_search").value = "Current Location";
        }
    </script>
</body>

</html>
