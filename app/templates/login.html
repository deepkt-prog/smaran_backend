<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9933;
            --bg-color: #fdfbf7;
            --text-color: #333;
            --card-bg: #fff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        button,
        input,
        select,
        textarea {
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #d35400;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Welcome Back</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/auth/login" method="post">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div style="margin: 15px 0; color: #aaa; display: flex; align-items: center;">
            <span style="flex:1; border-top: 1px solid #eee;"></span>
            <span style="padding: 0 10px; font-size: 0.85rem;">OR</span>
            <span style="flex:1; border-top: 1px solid #eee;"></span>
        </div>

        <a href="/auth/google/login" style="text-decoration: none;">
            <button type="button"
                style="background-color: white; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="G">
                Sign in with Google
            </button>
        </a>
        <br>
        <a href="/auth/signup">Create an Account</a>
    </div>
</body>

</html>
